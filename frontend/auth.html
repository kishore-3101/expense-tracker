<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-box">

            <div class="auth-header">
                <span class="logo">₹</span>
                <h1>Expense Tracker</h1>
                <p class="header-sub">Manage your money, your way</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="you@gmail.com" required />
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required />
                </div>
                <button type="submit" class="submit-btn">Login</button>
                <p id="loginMsg" class="msg"></p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display:none;">
                <div class="field">
                    <label>Name</label>
                    <input type="text" id="registerName" placeholder="Kishore" required />
                </div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="you@gmail.com" required />
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="••••••••" required />
                </div>
                <button type="submit" class="submit-btn">Register</button>
                <p id="registerMsg" class="msg"></p>
            </form>

        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
